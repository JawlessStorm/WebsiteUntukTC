<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Access 🎀</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink:       #F4A7B9;
      --pink-deep:  #D4537E;
      --pink-pale:  #FBD0DA;
      --pink-bg:    #FFF0F5;
      --pink-bdr:   #F4C5D0;
      --brown:      #3D2B2B;
      --brown-mid:  #7A5060;
      --mauve:      #C490A0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--pink-bg);
      color: var(--brown);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Dot pattern background (matching original) */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, #F4A7B918 1.5px, transparent 1.5px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    .lock-container {
      width: 100%;
      max-width: 380px;
      padding: 24px;
      z-index: 1;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .lock-card {
      background: #fff;
      border-radius: 28px;
      padding: 32px 24px 28px;
      box-shadow: 0 8px 40px #F4A7B928, 0 1px 4px #00000008;
      border: 1px solid var(--pink-bdr);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .lock-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 6vw, 32px);
      color: var(--brown);
      margin-bottom: 4px;
    }

    /* Password Dots Display */
    .dots-wrap {
      display: flex;
      gap: 14px;
      height: 24px;
      margin-bottom: 8px;
    }
    .dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid var(--pink-bdr);
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .dot.filled {
      background: var(--pink-deep);
      border-color: var(--pink-deep);
      transform: scale(1.15);
      box-shadow: 0 0 8px #D4537E40;
    }

    .hint-text {
      font-size: 13px;
      color: var(--mauve);
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    .hint-text span { color: var(--brown-mid); font-weight: 400; }

    /* Keypad */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
    }
    .key {
      height: 58px;
      border-radius: 16px;
      border: 1.5px solid var(--pink-bdr);
      background: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--brown);
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .key:hover, .key:active {
      background: var(--pink-bg);
      transform: scale(0.96);
      border-color: var(--pink);
    }
    .key.action-back { color: var(--mauve); background: #FAFAFA; }
    .key.action-enter {
      background: var(--pink-deep);
      color: #fff;
      border-color: var(--pink-deep);
    }
    .key.action-enter:hover { background: #C03560; }

    /* Animations */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease-in-out; }

    .fade-out {
      opacity: 0;
      transform: scale(0.92) translateY(20px);
      pointer-events: none;
    }

    /* Responsive tweaks */
    @media (max-height: 600px) {
      .lock-card { padding: 24px 20px 20px; gap: 16px; }
      .key { height: 50px; font-size: 18px; }
    }
  </style>
</head>
<body>

  <main class="lock-container" id="lockContainer">
    <div class="lock-card" id="lockCard">
      <h1 class="lock-title">Access 🎀</h1>
      
      <div class="dots-wrap" id="dotsWrap">
        <!-- Dots injected by JS -->
      </div>

      <p class="hint-text" id="hintLabel">Hint : <span id="hintValue">Loading...</span></p>

      <div class="keypad" id="keypad">
        <button class="key" data-val="1">1</button>
        <button class="key" data-val="2">2</button>
        <button class="key" data-val="3">3</button>
        <button class="key" data-val="4">4</button>
        <button class="key" data-val="5">5</button>
        <button class="key" data-val="6">6</button>
        <button class="key" data-val="7">7</button>
        <button class="key" data-val="8">8</button>
        <button class="key" data-val="9">9</button>
        <button class="key action-back" data-action="back">←</button>
        <button class="key" data-val="0">0</button>
        <button class="key action-enter" data-action="check">✓</button>
      </div>
    </div>
  </main>

  <script>
    /* =============================================
       🔐 KONFIGURASI PASSWORD & HINT
       Ganti sesuai keinginan kamu!
    ============================================= */
    const CONFIG = {
      password: '092025',          // Password yang benar
      hint: 'First time dc together "kiyowo" MM/YYYY 🎀', // Teks hint
      targetPage: 'birthday.html',     // Halaman tujuan setelah berhasil
      passwordLength: 6                // Jumlah digit yang ditampilkan
    };

    /* ─────────────────────────────────────────────
       LOGIKA UTAMA (JANGAN DIUBAH KECUALI PAHAM)
    ────────────────────────────────────────────── */
    let currentInput = '';
    const dotsWrap = document.getElementById('dotsWrap');
    const lockCard = document.getElementById('lockCard');
    const lockContainer = document.getElementById('lockContainer');
    const hintValue = document.getElementById('hintValue');

    // Set hint
    hintValue.textContent = CONFIG.hint;

    // Generate dots
    function renderDots() {
      dotsWrap.innerHTML = '';
      for (let i = 0; i < CONFIG.passwordLength; i++) {
        const dot = document.createElement('div');
        dot.className = `dot${i < currentInput.length ? ' filled' : ''}`;
        dotsWrap.appendChild(dot);
      }
    }
    renderDots();

    // Handle keypad clicks
    document.getElementById('keypad').addEventListener('click', (e) => {
      const btn = e.target.closest('.key');
      if (!btn) return;

      const val = btn.dataset.val;
      const action = btn.dataset.action;

      if (val !== undefined) {
        if (currentInput.length < CONFIG.passwordLength) {
          currentInput += val;
          renderDots();
          
          // Auto-check jika sudah penuh
          if (currentInput.length === CONFIG.passwordLength) {
            setTimeout(checkPassword, 200);
          }
        }
      } 
      else if (action === 'back') {
        currentInput = currentInput.slice(0, -1);
        renderDots();
        lockCard.classList.remove('shake');
      } 
      else if (action === 'check') {
        checkPassword();
      }
    });

    function checkPassword() {
      if (currentInput === CONFIG.password) {
        // ✅ Benar
        lockContainer.classList.add('fade-out');
        setTimeout(() => {
          window.location.replace(CONFIG.targetPage);
        }, 600);
      } else {
        // ❌ Salah
        lockCard.classList.add('shake');
        // Clear setelah animasi shake selesai
        setTimeout(() => {
          currentInput = '';
          renderDots();
          lockCard.classList.remove('shake');
        }, 450);
      }
    }

    // Support keyboard fisik (laptop/desktop)
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') {
        const btn = document.querySelector(`.key[data-val="${e.key}"]`);
        if (btn) btn.click();
      } else if (e.key === 'Backspace') {
        document.querySelector('.key[data-action="back"]').click();
      } else if (e.key === 'Enter') {
        document.querySelector('.key[data-action="check"]').click();
      }
    });
  </script>
</body>
</html>
